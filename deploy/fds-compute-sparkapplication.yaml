# ─────────────────────────────────────────────────────────────────────────────
# FDS Compute — StackDistancePipelineJob (fd-compute-spark-June)
#
# Input:  fds-e3testing-bucket-husingh/raw-logs/
# Output: fds-e3testing-bucket-husingh/fd_compute_output/
# Endpoint (both): us-ord-10.linodeobjects.com
#
# Apply:
#   kubectl apply -f deploy/fds-compute-sparkapplication.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Input bucket credentials (fds-e3testing-bucket-husingh — same as output) ──
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-input-creds
  namespace: spark-operator
stringData:
  access-key: "<INPUT_S3_ACCESS_KEY>"
  secret-key: "<INPUT_S3_SECRET_KEY>"

---

# ── Output bucket credentials ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-output-creds
  namespace: spark-operator
stringData:
  access-key: "<OUTPUT_S3_ACCESS_KEY>"
  secret-key: "<OUTPUT_S3_SECRET_KEY>"

---

# ── Encryption keys (for input bucket SSE-C) ─────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-encryption-keys
  namespace: spark-operator
stringData:
  encryption-keys.json: '{"1": "<SSE_C_KEY_1_BASE64>", "2": "<SSE_C_KEY_2_BASE64>"}'

---

apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: fds-compute-pipeline
  namespace: spark-operator

spec:
  type: Scala
  mode: cluster
  image: "apache/spark:3.5.8-scala2.12-java11-ubuntu"
  imagePullPolicy: IfNotPresent

  mainClass: com.fd.compute.StackDistancePipelineJob
  mainApplicationFile: "https://fds-jar.in-maa-1.linodeobjects.com/fd_compute_jar/withRegex/fd-compute-spark-assembly.jar"

  sparkVersion: "3.5.0"

  restartPolicy:
    type: Never

  # libFDCompute.so compiled on Ubuntu 22.04 (GLIBC 2.35) - compatible with spark 3.5.8
  deps:
    files:
      - "https://fds-jar.in-maa-1.linodeobjects.com/fd_compute_jar/libFDCompute.so"

  hadoopConf:
    "fs.s3a.impl":                "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.path.style.access":   "true"
    "fs.s3a.signing-algorithm":   "S3SignerType"
    "fs.s3a.checksum.validation": "false"
    "fs.s3a.connection.ssl.enabled": "true"
    "fs.s3a.endpoint":            "us-ord-10.linodeobjects.com"

  sparkConf:
    "spark.serializer":                  "org.apache.spark.serializer.KryoSerializer"
    "spark.network.timeout":             "800s"
    "spark.executor.heartbeatInterval":  "60s"
    "spark.kryoserializer.buffer.max":   "512m"
    "spark.jars.ivy":                    "/tmp/.ivy2"
    "spark.driver.extraJavaOptions":     "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED -Dfd.computation.enableFiltering=true -Dfd.computation.date.start=2026-05-25 -Dfd.computation.date.end=2026-05-28 -Dfd.computation.filter.type=cw -Dfile.pattern=200258696:ch185,201559935:cw-s-use,201559936:cw-s-use,200398666:cw-s-eu,352422:ch2"
    "spark.executor.extraJavaOptions":   "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED"
    # Credentials injected as env vars via Spark Operator secret refs
    "spark.kubernetes.driver.secretKeyRef.S3_ACCESS_KEY":        "fds-compute-input-creds:access-key"
    "spark.kubernetes.driver.secretKeyRef.S3_SECRET_KEY":        "fds-compute-input-creds:secret-key"
    "spark.kubernetes.driver.secretKeyRef.S3_OUTPUT_ACCESS_KEY": "fds-compute-output-creds:access-key"
    "spark.kubernetes.driver.secretKeyRef.S3_OUTPUT_SECRET_KEY": "fds-compute-output-creds:secret-key"
    "spark.kubernetes.executor.secretKeyRef.S3_ACCESS_KEY":        "fds-compute-input-creds:access-key"
    "spark.kubernetes.executor.secretKeyRef.S3_SECRET_KEY":        "fds-compute-input-creds:secret-key"
    "spark.kubernetes.executor.secretKeyRef.S3_OUTPUT_ACCESS_KEY": "fds-compute-output-creds:access-key"
    "spark.kubernetes.executor.secretKeyRef.S3_OUTPUT_SECRET_KEY": "fds-compute-output-creds:secret-key"
    "spark.kubernetes.driverEnv.FD_DEBUG_DUMP":                    "false"
    # Per-run id: change for every pipeline run. Propagated to driver+executor
    # JVMs (spark-operator's env: array does not reliably reach JVM env).
    "spark.kubernetes.driverEnv.FD_JOB_RUN_ID":                    "run-20260603-002"
    "spark.executorEnv.FD_JOB_RUN_ID":                             "run-20260603-002"
    # FD_MAPREDUCE_* must be in sparkConf (executorEnv) to reach JVM sys.env
    # (executor.env: array does NOT propagate to JVM environment).
    "spark.executorEnv.FD_MAPREDUCE_MAPRULES":        "mm1"
    "spark.executorEnv.FD_MAPREDUCE_NETWORK":         "FF"
    "spark.executorEnv.FD_MAPREDUCE_SERIAL_BUCKET":   "8"
    "spark.executorEnv.FD_MAPREDUCE_START_TIME":      "0"
    "spark.executorEnv.FD_MAPREDUCE_END_TIME":        "2147483647"
    "spark.executorEnv.FD_MAPREDUCE_NODELEN":         "2000000"
    "spark.kubernetes.executor.deleteOnTermination":               "false"
    # ── Input filter (replaces legacy customFilter.jar) ────────────────────────
    # When enableFiltering=true, only files under
    #   s3a://<bucket>/<prefix>/YYYY-MM-DD/<arlId>/<metro>/...
    # whose date is in [start,end] AND whose <arlId>/<metro> matches
    # 'file.pattern' will be processed.
    "fd.computation.enableFiltering": "true"
    "fd.computation.date.start":      "2026-05-25"
    "fd.computation.date.end":        "2026-05-28"
    "fd.computation.filter.type":     "cw"   # "cw" | "expansion"
    "file.pattern":                   "200258696:ch185,201559935:cw-s-use,201559936:cw-s-use,200398666:cw-s-eu,352422:ch2"

  # ── Positional args ──────────────────────────────────────────────────────────
  # [0] s3Bucket          — input bucket
  # [1] s3Prefix          — input prefix
  # [2] encryptionKeysFile— mounted path
  # [3] numMappers
  # [4] numReducers
  # [5] s3OutputPrefix    — output prefix in output bucket
  # [6] outputBucket      — output bucket
  arguments:
    - "fds-cw-preproc-output-ord-sqa"
    - "cw_storelog_v2_1mi_classic/footprint/fd_input"
    - "/mnt/encryption-keys/encryption-keys.json"
    - "32"
    - "4"
    - "fd_compute_output/sqa"
    - "fds-e3testing-bucket-husingh"

  # ── Driver ───────────────────────────────────────────────────────────────────
  driver:
    cores: 2
    memory: "4g"
    serviceAccount: spark
    labels:
      app: fds-compute
      component: driver
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
      # Per-run id — change for every pipeline run so concurrent jobs write
      # to isolated /tmp/fd_compute/<id> directories on the executors.
      - name: FD_JOB_RUN_ID
        value: "run-20260603-002"
      - name: FD_MAPREDUCE_MAPRULES
        value: "mm1"
      - name: FD_MAPREDUCE_NETWORK
        value: "FF"
      - name: FD_MAPREDUCE_SERIAL_BUCKET
        value: "8"
      - name: FD_MAPREDUCE_START_TIME
        value: "0"
      - name: FD_MAPREDUCE_END_TIME
        value: "2147483647"
      - name: FD_MAPREDUCE_NODELEN
        value: "2000000"
      - name: FD_DEBUG_DUMP
        value: "false"
    secrets:
      - name: fds-compute-encryption-keys
        path: /mnt/encryption-keys
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185

  # ── Executors ────────────────────────────────────────────────────────────────
  executor:
    cores: 4
    instances: 1
    memory: "8g"
    memoryOverhead: "2g"
    labels:
      app: fds-compute
      component: executor
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
      # Must match driver's FD_JOB_RUN_ID.
      - name: FD_JOB_RUN_ID
        value: "run-20260603-002"
      - name: FD_MAPREDUCE_MAPRULES
        value: "mm1"
      - name: FD_MAPREDUCE_NETWORK
        value: "FF"
      - name: FD_MAPREDUCE_SERIAL_BUCKET
        value: "8"
      - name: FD_MAPREDUCE_START_TIME
        value: "0"
      - name: FD_MAPREDUCE_END_TIME
        value: "2147483647"
      - name: FD_MAPREDUCE_NODELEN
        value: "2000000"
    secrets:
      - name: fds-compute-encryption-keys
        path: /mnt/encryption-keys
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185
