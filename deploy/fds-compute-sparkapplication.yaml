# ─────────────────────────────────────────────────────────────────────────────
# FDS Compute — StackDistancePipelineJob (fd-compute-spark-June)
# Standard FD run — mirrors Hadoop 3fd_ComputeFD command.
#
# Input:  fds-e3testing-bucket-husingh/fd_input/  (plain gzip, .Key2 suffix)
# Output: fds-e3testing-bucket-husingh/fd_compute_output/june16/run-3fd-20260616-17/
# Endpoint (both): us-ord-10.linodeobjects.com
#
# Hadoop equivalents:
#   FD_MAPREDUCE_START_TIME=1776038400  (2026-04-13 00:00:00 UTC)
#   FD_MAPREDUCE_END_TIME=1776470400    (2026-04-18 00:00:00 UTC)
#   mapreduce.job.reduces=2048
#   file.pattern=1000005:mch-ff-lo
#
# Apply:
#   kubectl apply -f deploy/fds-compute-sparkapplication.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Input bucket credentials ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-input-creds
  namespace: spark-operator
stringData:
  access-key: "<INPUT_S3_ACCESS_KEY>"
  secret-key: "<INPUT_S3_SECRET_KEY>"

---

# ── Output bucket credentials ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-output-creds
  namespace: spark-operator
stringData:
  access-key: "<OUTPUT_S3_ACCESS_KEY>"
  secret-key: "<OUTPUT_S3_SECRET_KEY>"

---

# ── Input encryption keys ─────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-encryption-keys
  namespace: spark-operator
stringData:
  encryption-keys.json: '{"1": "<INPUT_SSE_C_KEY_1_BASE64>", "2": "<INPUT_SSE_C_KEY_2_BASE64>"}'

---

# ── Output encryption keys ────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fds-compute-encryption-keys-output
  namespace: spark-operator
stringData:
  encryption-keys.json: '{"1": "<OUTPUT_SSE_C_KEY_1_BASE64>", "2": "<OUTPUT_SSE_C_KEY_2_BASE64>"}'

---

apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: fds-compute-pipeline
  namespace: spark-operator

spec:
  type: Scala
  mode: cluster
  image: "apache/spark:3.5.8-scala2.12-java11-ubuntu"
  imagePullPolicy: IfNotPresent

  mainClass: com.fd.compute.StackDistancePipelineJob
  mainApplicationFile: "https://fds-jar.in-maa-1.linodeobjects.com/fd_compute_jar/tiebreak/fd-compute-spark-assembly.jar"
  sparkVersion: "3.5.0"

  restartPolicy:
    type: Never

  hadoopConf:
    "fs.s3a.impl":                "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.path.style.access":   "true"
    "fs.s3a.signing-algorithm":   "S3SignerType"
    "fs.s3a.checksum.validation": "false"
    "fs.s3a.connection.ssl.enabled": "true"
    "fs.s3a.endpoint":            "us-ord-10.linodeobjects.com"

  sparkConf:
    "spark.serializer":                  "org.apache.spark.serializer.KryoSerializer"
    "spark.network.timeout":             "800s"
    "spark.executor.heartbeatInterval":  "60s"
    "spark.kryoserializer.buffer.max":   "512m"
    "spark.jars.ivy":                    "/tmp/.ivy2"
    "spark.task.maxFailures":            "20"
    "spark.stage.maxConsecutiveAttempts": "100"
    "spark.shuffle.io.maxRetries":       "10"
    "spark.shuffle.io.retryWait":        "15s"
    "spark.driver.extraJavaOptions":     "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED -Dfd.computation.enableFiltering=true -Dfd.computation.date.start=2026-04-13 -Dfd.computation.date.end=2026-04-18 -Dfile.pattern=1000005:mch-ff-lo"
    "spark.executor.extraJavaOptions":   "-Duser.home=/tmp -Djava.library.path=. --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED"
    # Credentials via Spark Operator secret refs
    "spark.kubernetes.driver.secretKeyRef.S3_ACCESS_KEY":          "fds-compute-input-creds:access-key"
    "spark.kubernetes.driver.secretKeyRef.S3_SECRET_KEY":          "fds-compute-input-creds:secret-key"
    "spark.kubernetes.driver.secretKeyRef.S3_OUTPUT_ACCESS_KEY":   "fds-compute-output-creds:access-key"
    "spark.kubernetes.driver.secretKeyRef.S3_OUTPUT_SECRET_KEY":   "fds-compute-output-creds:secret-key"
    "spark.kubernetes.executor.secretKeyRef.S3_ACCESS_KEY":        "fds-compute-input-creds:access-key"
    "spark.kubernetes.executor.secretKeyRef.S3_SECRET_KEY":        "fds-compute-input-creds:secret-key"
    "spark.kubernetes.executor.secretKeyRef.S3_OUTPUT_ACCESS_KEY": "fds-compute-output-creds:access-key"
    "spark.kubernetes.executor.secretKeyRef.S3_OUTPUT_SECRET_KEY": "fds-compute-output-creds:secret-key"
    "spark.kubernetes.driverEnv.FD_DEBUG_DUMP":    "false"
    "spark.kubernetes.driverEnv.FD_JOB_RUN_ID":   "run-3fd-20260616-17"
    "spark.executorEnv.FD_JOB_RUN_ID":            "run-3fd-20260616-17"
    # FD_MAPREDUCE_* — exact values from Hadoop 3fd_ComputeFD command
    "spark.executorEnv.FD_MAPREDUCE_NETWORK":              "freeflow"
    "spark.executorEnv.FD_MAPREDUCE_START_TIME":           "1776038400"
    "spark.executorEnv.FD_MAPREDUCE_END_TIME":             "1776470400"
    "spark.executorEnv.FD_MAPREDUCE_PREWARM_PERIOD":       "0"
    "spark.executorEnv.FD_MAPREDUCE_PREWARM_CONFIG_RELATIVE": "1"
    "spark.executorEnv.FD_MAPREDUCE_SAMPLE_ON_ATTEMPT":    "0"
    "spark.executorEnv.FD_MAPREDUCE_SAMPLE_BUCKETS":       "20"
    "spark.executorEnv.FD_MAPREDUCE_RAM_SIZE":             "64"
    "spark.executorEnv.FD_MAPREDUCE_THINNING_PCT_JUMP":    "5"
    "spark.executorEnv.FD_MAPREDUCE_URL_BUCKET":           "2039"
    "spark.kubernetes.executor.deleteOnTermination":        "true"
    "spark.kubernetes.executor.maxPodFailures":             "40"
    # Spark-side filter — mirrors -D flags in Hadoop command
    "fd.computation.enableFiltering": "true"
    "fd.computation.date.start":      "2026-04-13"
    "fd.computation.date.end":        "2026-04-18"
    "file.pattern":                   "1000005:mch-ff-lo"

  # ── Positional args ──────────────────────────────────────────────────────────
  # [0] input bucket   [1] input prefix   [2] input enc keys
  # [3] numMappers     [4] numReducers (=hadoop's mapreduce.job.reduces)
  # [5] output prefix  [6] output bucket  [7] output enc keys
  arguments:
    - "fds-e3testing-bucket-husingh"
    - "fd_input/"
    - "/mnt/encryption-keys/input/encryption-keys.json"
    - "32"
    - "2048"
    - "fd_compute_output/june16/run-3fd-20260616-17/"
    - "fds-e3testing-bucket-husingh"
    - "/mnt/encryption-keys/output/encryption-keys.json"

  # ── Driver ───────────────────────────────────────────────────────────────────
  driver:
    cores: 2
    memory: "4g"
    serviceAccount: spark
    labels:
      app: fds-compute
      component: driver
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
      - name: FD_JOB_RUN_ID
        value: "run-3fd-20260616-17"
      - name: FD_MAPREDUCE_NETWORK
        value: "freeflow"
      - name: FD_MAPREDUCE_START_TIME
        value: "1776038400"
      - name: FD_MAPREDUCE_END_TIME
        value: "1776470400"
      - name: FD_MAPREDUCE_PREWARM_PERIOD
        value: "0"
      - name: FD_MAPREDUCE_PREWARM_CONFIG_RELATIVE
        value: "1"
      - name: FD_MAPREDUCE_SAMPLE_ON_ATTEMPT
        value: "0"
      - name: FD_MAPREDUCE_SAMPLE_BUCKETS
        value: "20"
      - name: FD_MAPREDUCE_RAM_SIZE
        value: "64"
      - name: FD_MAPREDUCE_THINNING_PCT_JUMP
        value: "5"
      - name: FD_MAPREDUCE_URL_BUCKET
        value: "2039"
      - name: FD_DEBUG_DUMP
        value: "false"
    secrets:
      - name: fds-compute-encryption-keys
        path: /mnt/encryption-keys/input
        secretType: Generic
      - name: fds-compute-encryption-keys-output
        path: /mnt/encryption-keys/output
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185

  # ── Executors ────────────────────────────────────────────────────────────────
  executor:
    cores: 1
    instances: 3
    memory: "8g"
    memoryOverhead: "2g"
    labels:
      app: fds-compute
      component: executor
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: component
                  operator: In
                  values:
                    - executor
            topologyKey: kubernetes.io/hostname
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: "when_required"
      - name: S3_ENDPOINT
        value: "us-ord-10.linodeobjects.com"
      - name: FD_JOB_RUN_ID
        value: "run-3fd-20260616-17"
      - name: FD_MAPREDUCE_NETWORK
        value: "freeflow"
      - name: FD_MAPREDUCE_START_TIME
        value: "1776038400"
      - name: FD_MAPREDUCE_END_TIME
        value: "1776470400"
      - name: FD_MAPREDUCE_PREWARM_PERIOD
        value: "0"
      - name: FD_MAPREDUCE_PREWARM_CONFIG_RELATIVE
        value: "1"
      - name: FD_MAPREDUCE_SAMPLE_ON_ATTEMPT
        value: "0"
      - name: FD_MAPREDUCE_SAMPLE_BUCKETS
        value: "20"
      - name: FD_MAPREDUCE_RAM_SIZE
        value: "64"
      - name: FD_MAPREDUCE_THINNING_PCT_JUMP
        value: "5"
      - name: FD_MAPREDUCE_URL_BUCKET
        value: "2039"
    secrets:
      - name: fds-compute-encryption-keys
        path: /mnt/encryption-keys/input
        secretType: Generic
      - name: fds-compute-encryption-keys-output
        path: /mnt/encryption-keys/output
        secretType: Generic
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 185
